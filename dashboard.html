<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Majshan Web Studio Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="dashboard-body">
    <svg class="icon-sprite" aria-hidden="true">
      <symbol id="icon-menu" viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></symbol>
      <symbol id="icon-settings" viewBox="0 0 24 24"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/><path d="M4 12h2M18 12h2M12 4v2M12 18v2M6.3 6.3l1.4 1.4M16.3 16.3l1.4 1.4M17.7 6.3l-1.4 1.4M7.7 16.3l-1.4 1.4"/></symbol>
      <symbol id="icon-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
      <symbol id="icon-dashboard" viewBox="0 0 24 24"><path d="M4 5h7v7H4zM13 5h7v4h-7zM13 11h7v8h-7zM4 14h7v5H4z"/></symbol>
      <symbol id="icon-target" viewBox="0 0 24 24"><path d="M12 4a8 8 0 1 0 0 16 8 8 0 0 0 0-16z"/><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/></symbol>
      <symbol id="icon-home" viewBox="0 0 24 24"><path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></symbol>
      <symbol id="icon-upload" viewBox="0 0 24 24"><path d="M12 16V4"/><path d="m7 9 5-5 5 5"/><path d="M5 20h14"/></symbol>
      <symbol id="icon-refresh" viewBox="0 0 24 24"><path d="M20 12a8 8 0 0 1-14 5"/><path d="M4 12a8 8 0 0 1 14-5"/><path d="M18 3v4h-4M6 21v-4h4"/></symbol>
      <symbol id="icon-close" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"/></symbol>
      <symbol id="icon-send" viewBox="0 0 24 24"><path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/></symbol>
      <symbol id="icon-check" viewBox="0 0 24 24"><path d="m5 12 4 4L19 6"/></symbol>
      <symbol id="icon-message" viewBox="0 0 24 24"><path d="M4 5h16v11H7l-3 3z"/></symbol>
      <symbol id="icon-download" viewBox="0 0 24 24"><path d="M12 4v12"/><path d="m7 11 5 5 5-5"/><path d="M5 20h14"/></symbol>
      <symbol id="icon-logout" viewBox="0 0 24 24"><path d="M10 17 5 12l5-5"/><path d="M5 12h12"/><path d="M14 4h5v16h-5"/></symbol>
    </svg>
    <button id="sidebarToggle" class="sidebar-toggle" aria-label="Open sidebar"><svg class="icon"><use href="#icon-menu"></use></svg></button>
    <button id="adminQuickOpen" class="admin-fab hidden"><svg class="icon"><use href="#icon-settings"></use></svg>Admin</button>

    <aside id="leftSidebar" class="left-sidebar">
      <a class="sidebar-brand" href="./index.html" aria-label="Majshan Web Studio home">
        <span class="logo">MW</span>
        <span><strong>Majshan Web Studio</strong><small>Project workspace</small></span>
      </a>
      <div id="profileCard" class="profile"></div>
      <div class="card compact-card">
        <h3>Workspace</h3>
        <button id="openProjectFormBtn" class="hidden"><svg class="icon"><use href="#icon-plus"></use></svg>New Website Request</button>
        <button id="showMyProjectsBtn"><svg class="icon"><use href="#icon-dashboard"></use></svg>My Projects</button>
        <button id="showOpenProjectsBtn" class="hidden"><svg class="icon"><use href="#icon-target"></use></svg>Open Requests</button>
      </div>
      <div class="card compact-card">
        <h3>Chats</h3>
        <div id="chatThreads" class="thread-list"></div>
      </div>
    </aside>

    <main class="dashboard-main">
      <section class="wrap panel" id="userArea">
        <div class="dashboard-head">
          <div>
            <span class="eyebrow">Dashboard</span>
            <h1>Project Control Center</h1>
            <p id="roleOverview" class="note">Loading your workspace...</p>
            <div class="status" id="dashboardStatus" role="status"></div>
          </div>
          <a class="secondary-link dark" href="./index.html"><svg class="icon"><use href="#icon-home"></use></svg>Home</a>
        </div>

        <div class="grid-3 stats-row">
          <div class="stat-card"><span>Pending</span><strong id="pendingCount">0</strong></div>
          <div class="stat-card"><span>Accepted</span><strong id="acceptedCount">0</strong></div>
          <div class="stat-card"><span>Done / Closed</span><strong id="finishedCount">0</strong></div>
        </div>

        <div class="grid-2 dashboard-grid">
          <form id="projectRequestForm" class="card hidden">
            <h3>Request a Website</h3>
            <label>Project title <input required name="title" placeholder="Business website, online store, portfolio..." /></label>
            <label>Website type
              <select name="siteType" required>
                <option>Business Website</option>
                <option>Online Store</option>
                <option>Portfolio</option>
                <option>Landing Page</option>
                <option>Blog / News Website</option>
                <option>Custom Web App</option>
              </select>
            </label>
            <div class="grid-2 no-pad">
              <label>Budget <input required name="budget" placeholder="$500 or PKR 150,000" /></label>
              <label>Deadline <input type="date" name="deadline" /></label>
            </div>
            <label>Reference website or file link <input name="referenceUrl" type="url" placeholder="https://..." /></label>
            <label>Project details <textarea required name="description" rows="6" placeholder="Describe pages, design style, features, content, payment needs, and anything important."></textarea></label>
            <button type="submit"><svg class="icon"><use href="#icon-upload"></use></svg>Submit Website Request</button>
          </form>

          <section id="projectsCard" class="card">
            <div class="card-head"><h3 id="projectsTitle">Projects</h3><button type="button" id="refreshProjectsBtn" class="ghost small-btn"><svg class="icon"><use href="#icon-refresh"></use></svg>Refresh</button></div>
            <div id="projectList" class="project-list"></div>
          </section>
        </div>

        <section class="chat-wrap hidden" id="chatWrap">
          <div class="chat-head"><div><h3>Project Chat</h3><p id="chatMeta">Choose a project chat</p></div><button type="button" id="closeChatBtn" class="small-btn"><svg class="icon"><use href="#icon-close"></use></svg>Close</button></div>
          <div id="chatMessages" class="chat-messages"></div>
          <form id="chatForm" class="chat-form">
            <input name="message" placeholder="Write a message..." />
            <input type="file" name="attachment" id="chatAttachment" accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.zip,.rar,.txt,.psd,.ai,.fig" />
            <button><svg class="icon"><use href="#icon-send"></use></svg>Send</button>
          </form>
        </section>
      </section>
    </main>

    <section class="admin hidden" id="adminPanel">
      <div class="admin-content wrap">
        <div class="card-head"><h2>Admin Panel</h2><button id="closeAdminBtn" class="small-btn"><svg class="icon"><use href="#icon-close"></use></svg>Close</button></div>
        <div class="grid-2">
          <div class="card"><h3>Users</h3><div id="adminUsers"></div></div>
          <div class="card"><h3>All Projects</h3><div id="adminProjects"></div></div>
        </div>
      </div>
    </section>

    <script type="module" src="./dashboard.js"></script>
  </body>
</html>
